[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["glib", "nss", "nspr", "atk", "cups", "dbus", "libdrm", "libxkbcommon", "xorg.libX11", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes", "xorg.libXrandr", "xorg.libxcb", "mesa", "expat", "pango", "cairo", "alsa-lib"]

[build.nixpacksPlan.phases.install]
cmds = ["pip install -r requirements.txt", "playwright install chromium"]

[deploy]
startCommand = "python bot.py"